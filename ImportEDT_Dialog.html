<!DOCTYPE html>
<html lang="fr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <style>
    :root { --indigo:#6366f1; --green:#16a34a; --bg:#f8fafc; --txt:#1e293b; --muted:#64748b; }
    * { box-sizing:border-box; }
    body { font-family:'Inter',-apple-system,Segoe UI,Roboto,sans-serif; margin:0; background:var(--bg); color:var(--txt); padding:18px; }
    h1 { font-size:17px; margin:0 0 4px; }
    p.sub { margin:0 0 14px; color:var(--muted); font-size:13px; }
    #drop { border:2px dashed #cbd5e1; border-radius:12px; padding:26px; text-align:center; color:var(--muted);
            background:#fff; transition:.15s; cursor:pointer; }
    #drop.hover { border-color:var(--indigo); background:#eef2ff; color:var(--indigo); }
    #drop b { color:var(--txt); }
    textarea { width:100%; height:90px; margin-top:10px; border:1px solid #cbd5e1; border-radius:8px; padding:8px; font-family:monospace; font-size:11px; resize:vertical; }
    .row { display:flex; gap:10px; margin-top:12px; align-items:center; }
    button { background:var(--indigo); color:#fff; border:none; padding:10px 18px; border-radius:8px; font-weight:700; cursor:pointer; font-size:14px; }
    button.sec { background:#fff; color:var(--indigo); border:1px solid var(--indigo); }
    button:disabled { opacity:.5; cursor:not-allowed; }
    pre { background:#0f172a; color:#e2e8f0; padding:12px; border-radius:8px; font-size:12px; white-space:pre-wrap; margin-top:14px; max-height:230px; overflow:auto; }
    .niv { background:var(--indigo); color:#fff; border-radius:999px; padding:3px 12px; font-weight:700; font-size:13px; }
  </style>
</head>
<body>
  <h1>Importer le fichier EDT/PRONOTE</h1>
  <p class="sub">Niveau actif : <span class="niv" id="niv">…</span> — seuls les élèves de ce niveau seront conservés (MEF prévisionnel). Séparateur détecté automatiquement (virgule, point-virgule ou tabulation).</p>

  <div id="drop">📄 <b>Glisse ton fichier ici</b> ou clique pour le choisir<br><span style="font-size:12px">(.csv / .txt exporté d'EDT ou PRONOTE)</span>
    <input type="file" id="file" accept=".csv,.txt,text/csv" style="display:none">
  </div>
  <textarea id="csv" placeholder="…ou colle ici le contenu du fichier (avec les 2 lignes d'en-tête)."></textarea>

  <div class="row">
    <button class="sec" id="btnApercu">Analyser (sans écrire)</button>
    <button id="btnImport">Importer dans les onglets sources</button>
  </div>
  <pre id="out" style="display:none"></pre>

  <script>
    var contenu = '';
    var drop = document.getElementById('file'), zone = document.getElementById('drop'), ta = document.getElementById('csv');
    function out(t){ var o=document.getElementById('out'); o.style.display='block'; o.textContent=t; }
    function setBusy(b){ document.getElementById('btnApercu').disabled=b; document.getElementById('btnImport').disabled=b; }
    function lire(f){ var r=new FileReader(); r.onload=function(e){ contenu=e.target.result; ta.value=contenu.slice(0,4000); out('Fichier chargé : '+f.name+' ('+contenu.length+' caractères). Clique sur Analyser.'); }; r.readAsText(f,'UTF-8'); }

    zone.onclick=function(){ drop.click(); };
    drop.onchange=function(){ if(drop.files[0]) lire(drop.files[0]); };
    ['dragover','dragenter'].forEach(function(ev){ zone.addEventListener(ev,function(e){ e.preventDefault(); zone.classList.add('hover'); }); });
    ['dragleave','drop'].forEach(function(ev){ zone.addEventListener(ev,function(e){ e.preventDefault(); zone.classList.remove('hover'); }); });
    zone.addEventListener('drop',function(e){ if(e.dataTransfer.files[0]) lire(e.dataTransfer.files[0]); });
    ta.addEventListener('input',function(){ contenu=ta.value; });

    google.script.run.withSuccessHandler(function(n){ document.getElementById('niv').textContent=n||'?'; })
      .lireNiveauDepuisConfig();

    document.getElementById('btnApercu').onclick=function(){
      if(!contenu.trim()){ out('Charge ou colle d\'abord un fichier.'); return; }
      setBusy(true); out('Analyse…');
      google.script.run.withSuccessHandler(function(r){
        setBusy(false);
        out('Séparateur : '+r.sep+'\nNiveau '+r.niveau+' : '+r.stats.lu+' lus, '+r.stats.gardes+' gardés, '+r.stats.filtres+' filtrés.\n'+
            (r.warnings.length?('⚠ '+r.warnings.join('\n⚠ ')+'\n'):'')+'\nAperçu :\n - '+ (r.apercu.join('\n - ')||'(aucun)'));
      }).withFailureHandler(function(e){ setBusy(false); out('Erreur : '+e.message); }).apiApercuEDT(contenu, null);
    };

    document.getElementById('btnImport').onclick=function(){
      if(!contenu.trim()){ out('Charge ou colle d\'abord un fichier.'); return; }
      if(!confirm('Importer dans les onglets sources ? Les onglets de classes correspondants seront (ré)écrits.')) return;
      setBusy(true); out('Import en cours…');
      google.script.run.withSuccessHandler(function(r){
        setBusy(false);
        out(r.ok ? ('✅ '+r.resume) : ('❌ '+r.message));
      }).withFailureHandler(function(e){ setBusy(false); out('Erreur : '+e.message); }).apiImporterEDT(contenu);
    };
  </script>
</body>
</html>
