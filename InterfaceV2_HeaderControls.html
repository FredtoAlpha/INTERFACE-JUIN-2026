<script>
/**
 * Gestion des contrôles du header : Mode édition et Modale Finaliser
 */
(function() {
  'use strict';
  
  console.log('🎛️ Initialisation des contrôles du header...');
  
  // ============================================
  // 1. MODE ÉDITION (swap d'élèves)
  // ============================================
  
  let isEditMode = false;
  
  /**
   * Active le mode édition : bouton Éditer devient rouge pulsé
   */
  window.enableEditMode = function() {
    isEditMode = true;
    document.body.classList.add('mode-edit');
    console.log('✅ Mode édition activé - Bouton Éditer en rouge pulsé');
    
    // Optionnel : afficher un toast
    if (window.showToast) {
      showToast('Mode échange activé : cliquez sur deux élèves pour les permuter', 'info');
    }
  };
  
  /**
   * Désactive le mode édition
   */
  window.disableEditMode = function() {
    isEditMode = false;
    document.body.classList.remove('mode-edit');
    console.log('❌ Mode édition désactivé');
    
    // Optionnel : afficher un toast
    if (window.showToast) {
      showToast('Mode échange désactivé', 'info');
    }
  };
  
  /**
   * Toggle du mode édition
   */
  window.toggleEditMode = function() {
    if (isEditMode) {
      disableEditMode();
    } else {
      enableEditMode();
    }
  };
  
  /**
   * Getter pour savoir si le mode édition est actif
   */
  window.isEditModeActive = function() {
    return isEditMode;
  };
  
  // ============================================
  // 2. MODALE DE CONFIRMATION FINALISER
  // ============================================
  
  const modal = document.getElementById('finalizeConfirmModal');
  const content = document.getElementById('finalizeConfirmContent');
  const btnFinalize = document.getElementById('btnFinalize');
  const btnCancel = document.getElementById('btnCancelFinalize');
  const btnConfirm = document.getElementById('btnConfirmFinalize');
  
  if (!modal || !content || !btnFinalize || !btnCancel || !btnConfirm) {
    console.warn('⚠️ Éléments de la modale Finaliser non trouvés');
    return;
  }
  
  /**
   * Ouvre la modale de confirmation
   */
  function openFinalizeModal() {
    modal.classList.remove('hidden');
    
    // Animation d'entrée
    setTimeout(() => {
      content.classList.remove('scale-95', 'opacity-0');
      content.classList.add('scale-100', 'opacity-100');
    }, 10);
    
    // Focus sur le bouton Confirmer pour accessibilité
    setTimeout(() => {
      btnConfirm.focus();
    }, 100);
    
    console.log('📋 Modale de confirmation Finaliser ouverte');
  }
  
  /**
   * Ferme la modale de confirmation
   */
  function closeFinalizeModal() {
    content.classList.remove('scale-100', 'opacity-100');
    content.classList.add('scale-95', 'opacity-0');
    
    setTimeout(() => {
      modal.classList.add('hidden');
    }, 300);
    
    console.log('📋 Modale de confirmation Finaliser fermée');
  }
  
  /**
   * Récupère la disposition courante de façon robuste, indépendamment de la
   * portée interne de CoreScript (App n'est pas global). Essaie la fonction
   * exposée window.exportDisposition, puis lit directement le DOM en repli.
   */
  function getDispositionCourante() {
    if (typeof window.exportDisposition === 'function') {
      try {
        const d = window.exportDisposition();
        if (d && Object.keys(d).length) return d;
      } catch (e) { /* repli DOM ci-dessous */ }
    }
    const result = {};
    document.querySelectorAll('.class-column').forEach(function (col) {
      const nameEl = col.querySelector('.classe-name');
      if (!nameEl) return;
      const classe = (nameEl.textContent || '').trim();
      const ids = Array.from(col.querySelectorAll('.student-card'))
        .map(function (c) { return c.dataset.id; }).filter(Boolean);
      if (classe) result[classe] = ids;
    });
    return result;
  }

  /**
   * Exécute la finalisation : écrit les onglets FIN, puis ouvre le document à imprimer.
   */
  function executeFinalizeProcess() {
    const disposition = getDispositionCourante();

    if (!disposition || Object.keys(disposition).length === 0) {
      if (window.showToast) showToast('Aucune classe à finaliser.', 'warning');
      return;
    }

    if (window.showToast) showToast('Finalisation en cours…', 'info');

    google.script.run
      .withSuccessHandler(function (res) {
        if (res && res.success) {
          if (window.showToast) showToast('✅ Répartition finalisée (onglets FIN créés). Préparation du document à imprimer…', 'success');
          if (typeof window.imprimerRepartition === 'function') {
            setTimeout(function () { window.imprimerRepartition(); }, 500);
          }
        } else {
          if (window.showToast) showToast('⚠️ Finalisation incomplète : ' + ((res && res.error) || 'réessayez.'), 'error');
        }
      })
      .withFailureHandler(function (err) {
        if (window.showToast) showToast('❌ Erreur de finalisation : ' + (err && err.message || err), 'error');
      })
      .finalizeClasses(disposition, 'FIN');
  }

  /**
   * Construit un document imprimable (une section par classe) et lance l'impression.
   * L'utilisateur choisit « Enregistrer au format PDF » dans la boîte d'impression.
   */
  window.imprimerRepartition = function () {
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
      });
    }

    let printArea = document.getElementById('printArea');
    if (!printArea) {
      printArea = document.createElement('div');
      printArea.id = 'printArea';
      document.body.appendChild(printArea);
    }

    const dateStr = new Date().toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });
    let html = '<div class="print-header"><h1>Répartition des classes</h1>'
      + '<div class="print-date">Éditée le ' + esc(dateStr) + '</div></div>';

    document.querySelectorAll('.class-column').forEach(function (col) {
      const nameEl = col.querySelector('.classe-name');
      const className = (nameEl ? nameEl.textContent : '').trim();
      const cards = col.querySelectorAll('.student-card');
      let f = 0, m = 0, rows = '';

      cards.forEach(function (card, i) {
        const id = card.dataset.id;
        const s = (window.STATE && window.STATE.students && window.STATE.students[id]) || {};
        const sexe = (s.sexe || '').toUpperCase();
        if (sexe === 'F') f++; else if (sexe === 'M') m++;
        let nom = ((s.nom || '') + ' ' + (s.prenom || '')).trim();
        if (!nom) nom = (card.textContent || '').trim();
        rows += '<tr><td class="num">' + (i + 1) + '</td><td>' + esc(nom) + '</td>'
          + '<td class="ctr">' + esc(sexe) + '</td><td class="ctr">' + esc(s.lv2 || '') + '</td>'
          + '<td class="ctr">' + esc(s.opt || '') + '</td></tr>';
      });

      html += '<div class="print-class"><h2>' + esc(className)
        + ' <span class="print-eff">' + cards.length + ' élèves · ' + f + ' F / ' + m + ' G</span></h2>'
        + '<table class="print-table"><thead><tr><th class="num">#</th><th>Nom Prénom</th>'
        + '<th class="ctr">Sexe</th><th class="ctr">LV2</th><th class="ctr">Option</th></tr></thead>'
        + '<tbody>' + rows + '</tbody></table></div>';
    });

    printArea.innerHTML = html;
    window.print();
  };
  
  /**
   * Fonction de finalisation par défaut (sera écrasée si vous avez votre propre implémentation)
   */
  if (!window.finalizeClasses) {
    window.finalizeClasses = function() {
      console.warn('⚠️ finalizeClasses: Fallback local — la vraie finalisation passe par lancerSauvegardeAvecProgression → Backend_Finalisation.js');
      if (window.showToast) {
        showToast('⚠️ Finalisation non disponible — rechargez la page', 'warning');
      }
    };
  }
  
  // Événements
  
  // Clic sur le bouton Finaliser du header
  btnFinalize.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    openFinalizeModal();
  });
  
  // Clic sur Annuler
  btnCancel.addEventListener('click', function() {
    closeFinalizeModal();
  });
  
  // Clic sur Confirmer
  btnConfirm.addEventListener('click', function() {
    closeFinalizeModal();
    
    // Attendre que la modale se ferme avant d'exécuter
    setTimeout(() => {
      executeFinalizeProcess();
    }, 350);
  });
  
  // Fermer si clic sur le fond
  modal.addEventListener('click', function(e) {
    if (e.target === modal) {
      closeFinalizeModal();
    }
  });
  
  // Fermer avec Escape
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && !modal.classList.contains('hidden')) {
      closeFinalizeModal();
    }
  });
  
  // ============================================
  // 3. BOUTON ÉDITER - DÉSACTIVÉ
  // ============================================
  // ⚠️ La gestion du bouton Éditer est maintenant dans InterfaceV2_CoreScript.html
  // (bloc "1.6 GESTION DU MENU ÉDITER (DROPDOWN)")
  // Ne pas ajouter de listener ici pour éviter les doublons
  
  // ============================================
  // 4. BOUTON RÉGLER - DÉSACTIVÉ
  // ============================================
  // Le bouton Régler est maintenant géré par InterfaceV2_CoreScript.html
  // qui ouvre le menu dropdown #dropdownRegler (Menu B)
  // Le panneau plein écran #lisibilite-panel (Menu A) a été supprimé
  
  
  console.log('✅ Contrôles du header initialisés (Régler géré par CoreScript)');
  
})();
</script>
